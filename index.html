<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リガレッセ 報告管理システム</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f5f5f0;color:#1a1a18;font-size:14px;line-height:1.6}
:root{--brand:#1D9E75;--bl:#E1F5EE;--bd:#085041;--bg:#fff;--bg2:#f9f9f7;--bg3:#f5f5f0;--bor:rgba(0,0,0,.12);--bor2:rgba(0,0,0,.25);--t2:#555;--t3:#999}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:var(--bg);border-right:0.5px solid var(--bor);display:flex;flex-direction:column}
.sh{padding:14px;border-bottom:0.5px solid var(--bor)}
.logo{font-size:13px;font-weight:700;color:var(--brand)}
.logo-s{font-size:10px;color:var(--t3);margin-top:2px}
.ui{padding:10px 14px;border-bottom:0.5px solid var(--bor);background:var(--bg2);cursor:pointer}
.ui:hover{background:#e8f5f0}
.av{width:28px;height:28px;border-radius:50%;background:var(--bl);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--bd);margin-right:7px;vertical-align:middle}
.un{font-size:13px;font-weight:500;vertical-align:middle}
.ur{font-size:10px;color:var(--t3);padding-left:35px;margin-top:1px}
nav{flex:1;overflow-y:auto;padding:6px}
.ns{font-size:9px;color:var(--t3);font-weight:700;padding:10px 8px 3px;letter-spacing:.1em;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--t2);transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--bg2);color:#1a1a18}
.ni.on{background:var(--bl);color:var(--bd);font-weight:600}
.ni i{font-size:15px;width:17px;text-align:center}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{padding:10px 18px;border-bottom:0.5px solid var(--bor);background:var(--bg);display:flex;align-items:center;gap:10px}
.tb-t{font-size:15px;font-weight:500;flex:1}
.sy{font-size:11px;display:flex;align-items:center;gap:5px;color:var(--t2)}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.ok{background:#1D9E75}.dot.sy2{background:#EF9F27;animation:bl 1s infinite}.dot.er{background:#E24B4A}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.cnt{flex:1;overflow-y:auto;padding:16px 20px}
.card{background:var(--bg);border-radius:12px;border:0.5px solid var(--bor);padding:14px 18px;margin-bottom:12px}
.ct{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ct i{color:var(--brand)}
.gb{background:var(--bl);border-radius:7px;padding:9px 12px;margin-bottom:7px}
.gl{font-size:9px;color:#0F6E56;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.gt{font-size:12px;color:var(--bd)}
label{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px;display:block}
.sub{font-size:10px;color:var(--t3);margin-bottom:5px}
input[type=text],input[type=date],input[type=password],select{width:100%;border:0.5px solid var(--bor2);border-radius:6px;padding:6px 9px;font-size:13px;background:var(--bg);color:#1a1a18;outline:none;height:34px;font-family:inherit}
input:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 2px rgba(29,158,117,.1)}
textarea{width:100%;border:0.5px solid var(--bor2);border-radius:6px;padding:7px 9px;font-size:13px;background:var(--bg);color:#1a1a18;outline:none;resize:vertical;min-height:70px;font-family:inherit;line-height:1.6}
textarea:focus{border-color:var(--brand);box-shadow:0 0 0 2px rgba(29,158,117,.1)}
.ah{background:var(--bg2);border-radius:6px;padding:6px 11px;margin-bottom:9px;font-size:11px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:5px;border-left:3px solid var(--brand)}
.ib{border:0.5px solid var(--bor);border-radius:8px;padding:11px 13px;margin-bottom:7px}
.in{font-size:10px;font-weight:700;color:var(--brand);background:var(--bl);padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:5px}
.it{font-size:12px;font-weight:600;margin-bottom:7px}
.stars span{font-size:22px;cursor:pointer;color:#D3D1C7;line-height:1;transition:transform .1s;display:inline-block}
.stars span.on{color:#EF9F27}
.stars span:hover{transform:scale(1.1)}
.sl{font-size:10px;color:var(--t2);margin-left:5px;vertical-align:middle}
.fbb{background:#EFF6FF;border-radius:7px;padding:9px 11px;margin-top:7px;border-left:3px solid #60A5FA}
.fbl{font-size:9px;font-weight:700;color:#1E40AF;margin-bottom:4px;letter-spacing:.07em;text-transform:uppercase}
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:7px;padding:3px;margin-bottom:12px}
.tab{flex:1;padding:6px 8px;border-radius:5px;border:none;cursor:pointer;font-size:12px;background:transparent;color:var(--t2);font-family:inherit}
.tab.on{background:var(--bg);color:#1a1a18;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.07)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;border:0.5px solid var(--bor2);background:transparent;cursor:pointer;font-size:12px;color:#1a1a18;font-family:inherit;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--bg2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bp{background:var(--brand);color:#fff;border-color:var(--brand)}
.bp:hover{background:var(--bd)}
.bs{padding:4px 9px;font-size:11px}
.hi{border:0.5px solid var(--bor);border-radius:7px;padding:9px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.hi:hover{border-color:var(--brand);background:var(--bl)}
.bdg{display:inline-flex;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.bd2{background:#EAF3DE;color:#3B6D11}.bw{background:#EFF6FF;color:#1E40AF}.bm{background:#FEF3C7;color:#92400E}
.two{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.sc{background:var(--bg2);border-radius:7px;padding:10px;text-align:center}
.sn{font-size:22px;font-weight:700;color:var(--brand)}
.sl2{font-size:10px;color:var(--t2);margin-top:1px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9999}
.mo{background:var(--bg);border-radius:13px;width:88%;max-width:500px;max-height:80vh;overflow-y:auto;padding:18px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid var(--bor)}
.ac{border:0.5px solid var(--bor);border-radius:7px;padding:11px;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;gap:9px;transition:all .15s}
.ac:hover,.ac.on{border-color:var(--brand);background:var(--bl)}
.al{border-radius:7px;padding:9px 12px;font-size:12px;margin-bottom:10px;display:flex;align-items:center;gap:7px;line-height:1.5}
.ao{background:#ECFDF5;color:#065F46}.ae{background:#FEF2F2;color:#991B1B}.ai{background:#EFF6FF;color:#1E40AF}
.dv{height:0.5px;background:var(--bor);margin:10px 0}
.em{text-align:center;padding:32px 14px;color:var(--t3)}
.em i{font-size:38px;display:block;margin-bottom:9px;opacity:.25}
.sw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.sb{background:var(--bg);border-radius:14px;border:0.5px solid var(--bor);padding:28px;width:100%;max-width:420px}
.hidden{display:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DB_ID='d1f1b53669884da3a6246b3f7daf2519';
const DB_URL='https://app.notion.com/p/'+DB_ID;
const TK='rg_tk_v4',AK='rg_ac_v4',GK='rg_go_v4',PWK='rg_pw_v1',LK='rg_login_v1',IK='rg_items_v1';

const AXES=[
  {a:'①複数事業所の経営責任',items:[
    {id:'11',no:'①-1',pm:'①-1_KPI分析',pg:'①-1_目標',ps:'自己評価_①-1',pf:'FB_①-1',pr:'FB評価_①-1',
     t:'各事業所のKPI比較・分析（稼働率・訪問件数・収支）',d:null,w:'先週からの改善状況／次週の目標',m:'先月からの改善状況／次月の目標'},
    {id:'12',no:'①-2',pm:'①-2_改善指導',pg:'①-2_目標',ps:'自己評価_①-2',pf:'FB_①-2',pr:'FB評価_①-2',
     t:'不振事業所への改善指導（具体案の設計から運用）',d:'成績改善のために行ったこと',w:'目標達成のための運用評価／次週予定',m:'目標達成のための運用評価／次月予定'},
    {id:'13',no:'①-3',pm:'①-3_現場稼働',pg:'①-3_目標',ps:'自己評価_①-3',pf:'FB_①-3',pr:'FB評価_①-3',
     t:'人員不足時の現場・営業稼働への参画',d:'実行したこと（訪問・営業・その他）',w:'実行したこと・成果',m:'実行したこと・成果'},
  ]},
  {a:'②管理者の育成・評価',items:[
    {id:'21',no:'②-1',pm:'②-1_管理者育成',pg:'②-1_目標',ps:'自己評価_②-1',pf:'FB_②-1',pr:'FB評価_②-1',
     t:'管理者の評価・フィードバック（目標設定と達成度の確認）',d:null,w:'達成度の報告／次週の目標',m:'達成度の報告／次月の目標'},
  ]},
  {a:'③ガバナンス・リスク統括',items:[
    {id:'31',no:'③-1',pm:'③-1_事故クレーム',pg:null,ps:'自己評価_③-1',pf:'FB_③-1',pr:'FB評価_③-1',
     t:'重大事故・クレームのエスカレーション対応',d:'事象と対処',w:'経過状況報告',m:'問題を残さない'},
    {id:'32',no:'③-2',pm:'③-2_法令リスク',pg:null,ps:'自己評価_③-2',pf:'FB_③-2',pr:'FB評価_③-2',
     t:'法令リスクの早期察知',d:'事象と対処',w:'経過状況報告',m:'問題を残さない'},
  ]},
];
const ITEMS=AXES.flatMap(a=>a.items);
function getAxes(){return STATE.customAxes||AXES;}
function getItems(){return getAxes().flatMap(a=>a.items);}
const TL={daily:'日報',weekly:'週報',monthly:'月報'};
const BC={日報:'bd2',週報:'bw',月報:'bm'};
const SLBL=['','不十分','やや不十分','概ね達成','ほぼ達成','完全達成'];

const DEF_ACCS=[
  {id:'narita',name:'成田 浩明',role:'理事',pos:'executive',st:'本部'},
  {id:'seto',name:'瀬戸 担当',role:'管理責任者',pos:'manager',st:'豊岡'},
  {id:'lin',name:'林 担当',role:'管理責任者',pos:'manager',st:'茨木'},
  {id:'hirose',name:'広瀬 担当',role:'管理責任者',pos:'manager',st:'梅ケ谷'},
  {id:'kakimoto',name:'柿本 担当',role:'管理責任者',pos:'manager',st:'看多機'},
];

function gl(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function sl(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function td(){return new Date().toISOString().split('T')[0]}
function fd(d){if(!d)return'';const[y,m,dd]=d.split('-');return y+'年'+parseInt(m)+'月'+parseInt(dd)+'日'}
function wl(d){const dt=new Date(d);const dy=dt.getDay();const mo=new Date(dt);mo.setDate(dt.getDate()-(dy===0?6:dy-1));const su=new Date(mo);su.setDate(mo.getDate()+6);return(mo.getMonth()+1)+'/'+(mo.getDate())+'〜'+(su.getMonth()+1)+'/'+(su.getDate())+'週'}
function ml(d){const[y,m]=d.split('-');return y+'年'+parseInt(m)+'月'}
function h(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

let STATE={token:gl(TK,null),accs:gl(AK,DEF_ACCS),goals:gl(GK,{}),pws:gl(PWK,{}),loggedIn:gl(LK,null),customAxes:gl(IK,null),uid:'narita',page:'daily',sync:'ok',modal:null,entries:{},ratings:{},nextGoal:'',selRep:null,fbData:{},fbrData:{},allReps:[],loading:false};

async function nPost(path,body){
  const r=await fetch('https://notion-proxy.narihiro0322.workers.dev/notion'+path,{method:'POST',headers:{'Authorization':'Bearer '+STATE.token,'Content-Type':'application/json','Notion-Version':'2022-06-28'},body:JSON.stringify(body)});
  return r.json();
}
async function nPatch(path,body){
  const r=await fetch('https://notion-proxy.narihiro0322.workers.dev/notion'+path,{method:'PATCH',headers:{'Authorization':'Bearer '+STATE.token,'Content-Type':'application/json','Notion-Version':'2022-06-28'},body:JSON.stringify(body)});
  return r.json();
}
async function nQuery(filter,sorts,n=50){
  const b={page_size:n};if(filter)b.filter=filter;if(sorts)b.sorts=sorts;
  const r=await fetch('https://notion-proxy.narihiro0322.workers.dev/notion/databases/'+DB_ID+'/query',{method:'POST',headers:{'Authorization':'Bearer '+STATE.token,'Content-Type':'application/json','Notion-Version':'2022-06-28'},body:JSON.stringify(b)});
  return r.json();
}
function parseRep(p){
  const pr=p.properties;
  function rt(k){return(pr[k]?.rich_text||[]).map(r=>r.plain_text).join('')}
  function num(k){return pr[k]?.number||0}
  function sel(k){return pr[k]?.select?.name||''}
  function dt(k){return pr[k]?.date?.start||''}
  const o={id:p.id,種別:sel('種別'),報告者名:rt('報告者名'),事業所:sel('事業所'),報告日:dt('報告日'),特記事項:rt('特記事項'),FBステータス:sel('FBステータス')};
  getItems().forEach(it=>{o[it.pm]=rt(it.pm);o[it.ps]=num(it.ps);o[it.pf]=rt(it.pf);o[it.pr]=num(it.pr);if(it.pg)o[it.pg]=rt(it.pg);});
  return o;
}
function buildProps(type,date,entries,ratings,user){
  const tl=TL[type];
  const p={'報告タイトル':{title:[{text:{content:tl+'｜'+user.name+'｜'+date}}]},'種別':{select:{name:tl}},'報告者名':{rich_text:[{text:{content:user.name}}]},'事業所':{select:{name:user.st}},'役職':{select:{name:user.role}},'報告日':{date:{start:date}},'特記事項':{rich_text:[{text:{content:entries.free||''}}]},'FBステータス':{select:{name:'未対応'}}};
  getItems().forEach(it=>{
    if(entries[it.pm])p[it.pm]={rich_text:[{text:{content:entries[it.pm]}}]};
    if(it.pg&&entries[it.pg])p[it.pg]={rich_text:[{text:{content:entries[it.pg]}}]};
    if(ratings[it.ps])p[it.ps]={number:ratings[it.ps]};
  });
  return p;
}

function setSync(s){STATE.sync=s;const d=document.getElementById('sdot');const l=document.getElementById('slbl');if(d){d.className='dot '+(s==='ok'?'ok':s==='syncing'?'sy2':'er');l.textContent={ok:'Notion同期済',syncing:'同期中...',er:'同期エラー'}[s]||''}}

function stars(val,onChange,disabled){
  let h='<span class="stars">';
  for(let i=1;i<=5;i++)h+='<span class="'+(val>=i?'on':'')+'" '+(disabled?'':'onclick="'+onChange+'('+i+')"')+'>★</span>';
  if(val>0)h+='<span class="sl">'+SLBL[val]+'</span>';
  return h+'</span>';
}

function renderSetup(){
  return`<div class="sw"><div class="sb">
    <div style="font-size:18px;font-weight:700;color:var(--brand);margin-bottom:4px">RIGARESSE</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:22px">報告管理システム — 初回設定</div>
    <div style="font-size:11px;font-weight:700;color:var(--brand);margin-bottom:5px">STEP 1　Notionトークンを取得</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:14px;line-height:1.6">
      <a href="https://app.notion.com/developers/connections" target="_blank" style="color:var(--brand)">app.notion.com/developers/connections</a> を開き、「RIGARESSE報告システム」のトークンをコピーしてください。
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--brand);margin-bottom:5px">STEP 2　トークンを入力</div>
    <label>インテグレーショントークン</label>
    <input type="password" id="tk-in" placeholder="ntn_..." style="margin-bottom:10px">
    <div id="setup-err" class="hidden ae al" style="margin-bottom:10px"></div>
    <button class="btn bp" style="width:100%" onclick="doConnect()"><i class="ti ti-plug"></i>接続してはじめる</button>
    <div class="ai al" style="margin-top:12px"><i class="ti ti-info-circle"></i>トークンはこのブラウザにのみ保存されます。他の端末では再入力が必要です。</div>
  </div></div>`;
}

async function doConnect(){
  const t=document.getElementById('tk-in').value.trim();
  const e=document.getElementById('setup-err');
  if(!t){e.textContent='トークンを入力してください';e.classList.remove('hidden');return;}
  e.classList.add('hidden');
  try{
    const r=await fetch('https://notion-proxy.narihiro0322.workers.dev/notion/databases/'+DB_ID,{headers:{'Authorization':'Bearer '+t,'Notion-Version':'2022-06-28'}});
    const d=await r.json();
    if(d.id){STATE.token=t;sl(TK,t);render();}
    else{e.textContent='接続失敗: '+(d.message||'トークンまたはアクセス権を確認してください');e.classList.remove('hidden');}
  }catch(err){e.textContent='エラー: '+err.message;e.classList.remove('hidden');}
}

function getUser(){return STATE.accs.find(a=>a.id===STATE.uid)||STATE.accs[0]}

function renderSidebar(){
  const u=getUser();
  const isM=u&&(u.pos==='executive'||u.pos==='manager');
  const pages=[
    {id:'daily',icon:'ti-sun',label:'日報'},{id:'weekly',icon:'ti-calendar-week',label:'週報'},{id:'monthly',icon:'ti-calendar-month',label:'月報'},
    {id:'history',icon:'ti-history',label:'履歴'},
    ...(isM?[{id:'feedback',icon:'ti-message-circle',label:'フィードバック'}]:[]),
    {id:'export',icon:'ti-download',label:'エクスポート'},
    {id:'settings',icon:'ti-settings',label:'設定'},
  ];
  return`<div class="sidebar">
    <div class="sh"><div class="logo">RIGARESSE</div><div class="logo-s">報告管理システム</div></div>
    <div class="ui" onclick="showModal('switch')">
      <span class="av">${h(u?u.name[0]:'?')}</span><span class="un">${h(u?u.name:'')}</span>
      <div class="ur">${h(u?u.role+' / '+u.st:'')}</div>
    </div>
    <nav>
      <div class="ns">報告入力</div>
      ${pages.slice(0,3).map(p=>`<div class="ni ${STATE.page===p.id?'on':''}" onclick="nav('${p.id}')"><i class="ti ${p.icon}"></i>${p.label}</div>`).join('')}
      <div class="ns">管理</div>
      ${pages.slice(3).map(p=>`<div class="ni ${STATE.page===p.id?'on':''}" onclick="nav('${p.id}')"><i class="ti ${p.icon}"></i>${p.label}</div>`).join('')}
    </nav>
  </div>`;
}

function renderTopbar(){
  const titles={daily:'日報',weekly:'週報',monthly:'月報',history:'報告履歴',feedback:'フィードバック',export:'エクスポート',settings:'設定'};
  return`<div class="tb">
    <div class="tb-t">${titles[STATE.page]||''}</div>
    <div class="sy"><div class="dot ok" id="sdot"></div><span id="slbl">Notion同期済</span></div>
    <a href="${DB_URL}" target="_blank" class="btn bs"><i class="ti ti-external-link"></i>Notionで開く</a>
  </div>`;
}

function renderGoalBanners(type){
  const uid=STATE.uid;
  const wk=STATE.goals[uid+'_weekly'];const mo=STATE.goals[uid+'_monthly'];
  let s='';
  if(type==='daily'){
    if(wk)s+=`<div class="gb"><div class="gl">今週の目標</div><div class="gt">${h(wk)}</div></div>`;
    if(mo)s+=`<div class="gb"><div class="gl">今月の目標</div><div class="gt">${h(mo)}</div></div>`;
  }else if(type==='weekly'&&mo){
    s+=`<div class="gb"><div class="gl">今月の目標</div><div class="gt">${h(mo)}</div></div>`;
  }
  return s;
}

function renderForm(type){
  const u=getUser();
  const filtAxes=getAxes().map(ax=>({...ax,items:ax.items.filter(it=>it[type]!==null)})).filter(ax=>ax.items.length>0);
  const typeK={weekly:'週',monthly:'月'}[type];
  let s=renderGoalBanners(type);
  s+=`<div class="card"><div class="ct"><i class="ti ti-edit"></i>${TL[type]}入力</div>
    <div class="two" style="margin-bottom:12px">
      <div><label>報告日</label><input type="date" id="f-date" value="${td()}" style="width:100%"></div>
      <div><label>報告者</label><div style="padding:7px 9px;background:var(--bg2);border-radius:6px;font-size:13px;height:34px;display:flex;align-items:center">${h(u?u.name+' / '+u.st:'')}</div></div>
    </div>`;
  if(type==='weekly')s+=`<div style="background:var(--bl);border-radius:7px;padding:10px;margin-bottom:12px"><label style="color:var(--bd)">来週の目標</label><input type="text" id="f-ng" placeholder="来週の目標を入力..." value="${h(STATE.nextGoal)}" onchange="STATE.nextGoal=this.value" style="width:100%"></div>`;
  if(type==='monthly')s+=`<div style="background:#FEF3C7;border-radius:7px;padding:10px;margin-bottom:12px"><label style="color:#92400E">来月の目標</label><input type="text" id="f-ng" placeholder="来月の目標を入力..." value="${h(STATE.nextGoal)}" onchange="STATE.nextGoal=this.value" style="width:100%"></div>`;
  filtAxes.forEach(ax=>{
    s+=`<div class="ah"><i class="ti ti-building" style="font-size:12px"></i>${h(ax.a)}</div>`;
    ax.items.forEach(it=>{
      s+=`<div class="ib"><span class="in">${it.no}</span><div class="it">${h(it.t)}</div><div class="sub">${h(it[type])}</div>
        <textarea rows="3" placeholder="記入してください..." onchange="STATE.entries['${it.pm}']=this.value">${h(STATE.entries[it.pm]||'')}</textarea>`;
      if(it.pg&&(type==='weekly'||type==='monthly'))s+=`<div style="margin-top:7px"><label style="color:var(--brand)">次${typeK}の目標</label><input type="text" placeholder="目標を設定..." value="${h(STATE.entries[it.pg]||'')}" onchange="STATE.entries['${it.pg}']=this.value" style="width:100%"></div>`;
      s+=`</div>`;
    });
  });
  s+=`<div style="margin-bottom:10px"><label>特記事項・自由記述</label><textarea rows="2" placeholder="その他連絡事項・気づき等..." onchange="STATE.entries.free=this.value">${h(STATE.entries.free||'')}</textarea></div>
    <div id="form-msg"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <a href="${DB_URL}" target="_blank" class="btn bs"><i class="ti ti-external-link"></i>Notionで確認</a>
      <button class="btn bp" onclick="saveReport('${type}')"><i class="ti ti-cloud-upload"></i>Notionに保存</button>
    </div></div>`;
  return s;
}

async function saveReport(type){
  const u=getUser();
  const date=document.getElementById('f-date')?.value||td();
  const ng=document.getElementById('f-ng')?.value||STATE.nextGoal;
  setSync('syncing');
  const msg=document.getElementById('form-msg');
  if(msg)msg.innerHTML='';
  try{
    const props=buildProps(type,date,STATE.entries,STATE.ratings,u);
    const res=await nPost('/pages',{parent:{database_id:DB_ID},properties:props});
    if(res.id){
      if(type==='weekly'&&ng){STATE.goals[STATE.uid+'_weekly']=ng;sl(GK,STATE.goals);}
      if(type==='monthly'&&ng){STATE.goals[STATE.uid+'_monthly']=ng;sl(GK,STATE.goals);}
      setSync('ok');STATE.entries={};STATE.ratings={};STATE.nextGoal='';
      if(msg)msg.innerHTML='<div class="ao al"><i class="ti ti-check"></i>Notionに保存しました ✓</div>';
    }else{
      setSync('er');
      if(msg)msg.innerHTML='<div class="ae al"><i class="ti ti-alert-circle"></i>保存失敗: '+(res.message||JSON.stringify(res))+'</div>';
    }
  }catch(e){setSync('er');if(msg)msg.innerHTML='<div class="ae al"><i class="ti ti-alert-circle"></i>エラー: '+e.message+'</div>';}
}

function setStar(prop,val){STATE.ratings[prop]=val;const c=document.getElementById('stars-'+prop);if(c)c.innerHTML=stars(val,'setStar("'+prop+'",',false).slice(15,-7)+')';}

async function loadHistory(){
  const u=getUser();
  setSync('syncing');STATE.loading=true;
  try{
    const res=await nQuery({property:'報告者名',rich_text:{equals:u?.name||''}},{property:'報告日',direction:'descending'},50);
    if(res.results)STATE.allReps=res.results.map(parseRep);
    setSync('ok');
  }catch{setSync('er');}
  STATE.loading=false;renderContent();
}


function openRep(idx){STATE.selRep=STATE.allReps[idx];renderContent();}

  if(STATE.selRep)return renderRepDetail(STATE.selRep);
  const filter=STATE.hFilter||'all';
  const reps=(filter==='all'?STATE.allReps:STATE.allReps.filter(r=>r.種別===filter));
  const counts={日報:STATE.allReps.filter(r=>r.種別==='日報').length,週報:STATE.allReps.filter(r=>r.種別==='週報').length,月報:STATE.allReps.filter(r=>r.種別==='月報').length};
  let s=`<div class="three" style="margin-bottom:12px">
    ${['日報','週報','月報'].map(t=>`<div class="sc"><div class="sn">${counts[t]}</div><div class="sl2">${t}件数</div></div>`).join('')}
  </div><div class="card">
    <div style="display:flex;gap:7px;margin-bottom:10px;align-items:center">
      <div class="tabs" style="flex:1;margin-bottom:0">
        ${[['all','すべて'],['日報','日報'],['週報','週報'],['月報','月報']].map(([v,l])=>`<button class="tab ${filter===v?'on':''}" onclick="STATE.hFilter='${v}';renderContent()">${l}</button>`).join('')}

      <button class="btn bs" onclick="loadHistory()"><i class="ti ti-refresh"></i></button>
    </div>`;
  if(STATE.loading)s+=`<div class="em"><i class="ti ti-loader-2"></i>読み込み中...</div>`;
  else if(reps.length===0)s+=`<div class="em"><i class="ti ti-inbox"></i>記録がありません<br><small style="font-size:11px;margin-top:6px;display:block">「更新」ボタンを押してください</small></div>`;
  else reps.forEach(function(r,idx){
    var cls=BC[r['種別']]||'';
    var isFB=r['FBステータス']==='FB済';
    var isW=r['種別']==='週報';
    s+='<div class="hi" onclick="openRep('+idx+')"><div style="display:flex;align-items:center;gap:7px">';

    if(isFB)s+='<span style="font-size:10px;color:var(--brand);margin-left:auto">FB済✓</span>';
    s+='</div></div>';
  });
  return s+'</div>';

async function loadFeedback(){
  const u=getUser();
  setSync('syncing');STATE.loading=true;
  try{
    const res=await nQuery({and:[{property:'FBステータス',select:{equals:'未対応'}},{or:[{property:'種別',select:{equals:'週報'}},{property:'種別',select:{equals:'月報'}}]}]},{property:'登録日時',direction:'descending'},50);
    if(res.results){
      const all=res.results.map(parseRep);
      STATE.fbReps=all.filter(r=>{
        if(r.報告者名===u?.name)return false;
        if(u?.pos==='executive')return true;
        return r.事業所===u?.st;
      });
    }
    setSync('ok');
  }catch{setSync('er');}
  STATE.loading=false;renderContent();
}

function renderFBDetail(r){
  let s=`<button class="btn bs" style="margin-bottom:10px" onclick="STATE.selFB=null;STATE.fbData={};STATE.fbrData={};renderContent()"><i class="ti ti-arrow-left"></i>一覧に戻る</button>
    <div class="card"><div class="ct"><i class="ti ti-message-circle"></i>${h(r.報告者名)} <span class="bdg ${BC[r.種別]||''}">${r.種別}</span> <span style="font-size:11px;color:var(--t2);font-weight:400">${fd(r.報告日)}</span></div>`;
  getItems().forEach(it=>{
    const v=r[it.pm];const g=it.pg?r[it.pg]:null;
    if(!v&&!g)return;
    s+=`<div class="ib"><span class="in">${it.no}</span><div class="it">${h(it.t)}</div>`;
    if(v)s+=`<div style="font-size:12px;padding:7px 9px;background:var(--bg2);border-radius:5px;margin-bottom:5px;line-height:1.6">${h(v)}</div>`;
    if(g)s+=`<div style="font-size:12px;padding:5px 9px;background:var(--bl);border-radius:5px;color:var(--bd);margin-bottom:6px">目標：${h(g)}</div>`;
    if(r[it.ps]>0)s+=`<div style="margin-bottom:7px"><span style="font-size:10px;color:var(--t2)">自己評価：</span><span style="color:#EF9F27">${'★'.repeat(r[it.ps])}</span><span class="sl">${SLBL[r[it.ps]]}</span></div>`;
    const fv=STATE.fbData[it.pf]||'';
    const fr=STATE.fbrData[it.pr]||0;
    s+=`<div style="background:#EFF6FF;border:0.5px solid #BFDBFE;border-radius:6px;padding:9px">
      <div style="font-size:10px;font-weight:700;color:#1E40AF;margin-bottom:5px">フィードバック</div>
      <textarea rows="2" placeholder="コメント..." onchange="STATE.fbData['${it.pf}']=this.value" style="margin-bottom:5px">${h(fv)}</textarea>
      <div class="stars">`;
    for(let i=1;i<=5;i++)s+=`<span class="${fr>=i?'on':''}" onclick="STATE.fbrData['${it.pr}']=${i};renderContent()">★</span>`;
    s+=fr>0?`<span class="sl">${SLBL[fr]}</span>`:''
    s+=`</div></div></div>`;
  });
  s+=`<div id="fb-msg"></div><div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn bp" onclick="saveFB()"><i class="ti ti-send"></i>フィードバック送信</button></div></div>`;
  return s;
}

async function saveFB(){
  const r=STATE.selFB;if(!r)return;
  setSync('syncing');
  const props={'FBステータス':{select:{name:'FB済'}}};
  Object.entries(STATE.fbData).forEach(([k,v])=>{if(v)props[k]={rich_text:[{text:{content:v}}]}});
  Object.entries(STATE.fbrData).forEach(([k,v])=>{if(v)props[k]={number:v}});
  try{
    const res=await nPatch('/pages/'+r.id,{properties:props});
    const m=document.getElementById('fb-msg');
    if(res.id){setSync('ok');if(m)m.innerHTML='<div class="ao al">✓ フィードバックを送信しました</div>';setTimeout(()=>{STATE.selFB=null;STATE.fbData={};STATE.fbrData={};loadFeedback();},1500);}
    else{setSync('er');if(m)m.innerHTML='<div class="ae al">失敗: '+(res.message||'')+'</div>';}
  }catch(e){setSync('er');const m=document.getElementById('fb-msg');if(m)m.innerHTML='<div class="ae al">'+e.message+'</div>';}
}

async function loadExport(){
  setSync('syncing');STATE.loading=true;
  try{
    const res=await nQuery(null,[{property:'報告日',direction:'descending'}],100);
    if(res.results)STATE.expReps=res.results.map(parseRep);
    setSync('ok');
  }catch{setSync('er');}
  STATE.loading=false;renderContent();
}

function renderExport(){
  const reps=STATE.expReps||[];
  const fu=STATE.expUser||'all';const ft=STATE.expType||'all';const ff=STATE.expFrom||'';const fo=STATE.expTo||'';
  const isExec=STATE.accs.find(a=>a.id===STATE.uid)?.pos==='executive';
  const filtered=reps.filter(r=>{
    if(!isExec&&r[報告者名]!==STATE.accs.find(a=>a.id===STATE.uid)?.name)return false;
    const u=STATE.accs.find(a=>a.id===fu);
    if(fu!=='all'&&r.報告者名!==u?.name)return false;
    if(ft!=='all'&&r.種別!==ft)return false;
    if(ff&&r.報告日<ff)return false;
    if(fo&&r.報告日>fo)return false;
    return true;
  });
  let s=`<div class="card"><div class="ct"><i class="ti ti-filter"></i>絞り込み・エクスポート</div>
    <div class="two" style="margin-bottom:10px">
      <div><label>スタッフ</label><select onchange="STATE.expUser=this.value;renderContent()" style="width:100%">
        <option value="all">全員</option>${STATE.accs.map(a=>`<option value="${a.id}" ${fu===a.id?'selected':''}>${h(a.name)}</option>`).join('')}
      </select></div>
      <div><label>種別</label><select onchange="STATE.expType=this.value;renderContent()" style="width:100%">
        <option value="all">すべて</option><option ${ft==='日報'?'selected':''}>日報</option><option ${ft==='週報'?'selected':''}>週報</option><option ${ft==='月報'?'selected':''}>月報</option>
      </select></div>
      <div><label>開始日</label><input type="date" value="${ff}" onchange="STATE.expFrom=this.value;renderContent()" style="width:100%"></div>
      <div><label>終了日</label><input type="date" value="${fo}" onchange="STATE.expTo=this.value;renderContent()" style="width:100%"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:7px;align-items:center">
      <span style="font-size:12px;color:var(--t2)">${filtered.length}件</span>
      <button class="btn bs" onclick="loadExport()"><i class="ti ti-refresh"></i>更新</button>
      <button class="btn bp" onclick="doCSV()" ${filtered.length===0?'disabled':''}><i class="ti ti-file-spreadsheet"></i>CSV出力</button>
    </div></div>
  <div class="card">`;
  if(STATE.loading)s+=`<div class="em"><i class="ti ti-loader-2"></i>読み込み中...</div>`;
  else if(filtered.length===0)s+=`<div class="em"><i class="ti ti-inbox"></i>該当なし</div>`;
  else filtered.forEach(r=>{
    s+=`<div style="display:flex;gap:7px;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--bor)">
      <span class="bdg ${BC[r.種別]||''}">${r.種別}</span>
      <span style="font-size:12px;font-weight:600;min-width:78px">${fd(r.報告日)}</span>
      <span style="font-size:12px">${h(r.報告者名)}</span>
      <span style="font-size:11px;color:var(--t2)">${h(r.事業所)}</span>
      ${r.FBステータス==='FB済'?'<span style="font-size:10px;color:var(--brand);margin-left:auto">FB済</span>':''}
    </div>`;
  });
  return s+'</div>';
}

function doCSV(){
  const reps=STATE.expReps||[];
  const fu=STATE.expUser||'all';const ft=STATE.expType||'all';const ff=STATE.expFrom||'';const fo=STATE.expTo||'';
  const filtered=reps.filter(r=>{
    const u=STATE.accs.find(a=>a.id===fu);
    if(fu!=='all'&&r.報告者名!==u?.name)return false;
    if(ft!=='all'&&r.種別!==ft)return false;
    if(ff&&r.報告日<ff)return false;
    if(fo&&r.報告日>fo)return false;
    return true;
  });
  const headers=['種別','報告日','報告者名','事業所',...ITEMS.flatMap(it=>[it.no+'_記入',...(it.pg?[it.no+'_目標']:[])]),'特記事項','FBステータス'];
  const rows=filtered.map(r=>[r.種別,r.報告日,r.報告者名,r.事業所,...ITEMS.flatMap(it=>[r[it.pm]||'',...(it.pg?[r[it.pg]||'']:[])]),'特記事項'in r?r.特記事項:'',r.FBステータス||'']);
  const csv=[headers,...rows].map(row=>row.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download='リガレッセ報告_'+td()+'.csv';a.click();
}

function saveItems(){
  const axes=getAxes();
  const newAxes=axes.map((ax,ai)=>({
    ...ax,
    a:document.getElementById('ax-'+ai)?.value||ax.a,
    items:ax.items.map((it,ii)=>{
      const t=document.getElementById('it-'+ai+'-'+ii+'-t')?.value||it.t;
      const dv=document.getElementById('it-'+ai+'-'+ii+'-d')?.value||'';
      const w=document.getElementById('it-'+ai+'-'+ii+'-w')?.value||it.w;
      const m=document.getElementById('it-'+ai+'-'+ii+'-m')?.value||it.m;
      return{...it,t,d:dv==='（日報なし）'?null:dv,w,m};
    })
  }));
  STATE.customAxes=newAxes;
  sl(IK,newAxes);
  alert('項目を保存しました！');
  renderContent();
}

    sl(IK,null);
    renderContent();

}

      ${renderItemsEditor()}
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn bp bs" onclick="saveItems()"><i class="ti ti-device-floppy"></i>項目を保存</button>
      <button class="btn bs" onclick="resetItems()"><i class="ti ti-refresh"></i>初期値に戻す</button>
    </div>
  </div>
  <div class="card"><div class="ct"><i class="ti ti-lock"></i>パスワード管理</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:10px">各スタッフのパスワードを設定してください。未設定の場合は空欄でログインできます。</div>
    ${STATE.accs.map(a=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="font-size:12px;font-weight:600;min-width:100px;flex-shrink:0">${h(a.name)}</div>
      <input type="password" placeholder="パスワード" value="${h(STATE.pws[a.id]||'')}" 
        onchange="STATE.pws['${a.id}']=this.value;sl(PWK,STATE.pws)" style="flex:1;height:30px">
      <button class="btn bs" onclick="STATE.pws['${a.id}']=document.querySelector('[data-pw=\'${a.id}\']')?.value||'';sl(PWK,STATE.pws);alert('保存しました')">保存</button>
    </div>`).join('')}
    <button class="btn bp bs" style="margin-top:6px" onclick="sl(PWK,STATE.pws);alert('全パスワードを保存しました')"><i class="ti ti-device-floppy"></i>一括保存</button>
  </div>
  <div class="card"><div class="ct"><i class="ti ti-user-plus"></i>スタッフ追加</div>
    <div class="two" style="margin-bottom:9px">
      <div><label>氏名</label><input type="text" id="s-name" placeholder="氏名" style="width:100%"></div>
      <div><label>事業所</label><input type="text" id="s-st" placeholder="例：豊岡" style="width:100%"></div>
      <div><label>役職名</label><input type="text" id="s-role" value="管理責任者" style="width:100%"></div>
      <div><label>権限</label><select id="s-pos" style="width:100%"><option value="executive">理事・統括</option><option value="manager" selected>管理責任者</option><option value="staff">スタッフ</option></select></div>
    </div>
    <button class="btn bp bs" onclick="addAcc()"><i class="ti ti-plus"></i>追加</button>
    <div class="dv"></div>
    ${STATE.accs.map(a=>`<div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:0.5px solid var(--bor)">
      <div class="av" style="width:26px;height:26px;font-size:10px;flex-shrink:0">${h(a.name[0])}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${h(a.name)}</div><div style="font-size:10px;color:var(--t3)">${h(a.role)} / ${h(a.st)}</div></div>
      <button class="btn bs" style="color:#991B1B" onclick="delAcc('${a.id}')"><i class="ti ti-trash"></i></button>
    </div>`).join('')}
  </div>`;
}

function addAcc(){
  const name=document.getElementById('s-name')?.value.trim();
  if(!name)return;
  const role=document.getElementById('s-role')?.value||'管理責任者';
  const st=document.getElementById('s-st')?.value||'';
  const pos=document.getElementById('s-pos')?.value||'manager';
  STATE.accs=[...STATE.accs,{id:'u_'+Date.now(),name,role,pos,st}];
  sl(AK,STATE.accs);renderContent();
}
function delAcc(id){STATE.accs=STATE.accs.filter(a=>a.id!==id);sl(AK,STATE.accs);renderContent();}

function renderModal(){
  if(!STATE.modal)return'';
  if(STATE.modal==='switch'){
    let s=`<div class="ov" onclick="STATE.modal=null;renderContent()"><div class="mo" onclick="event.stopPropagation()">
      <div class="mh"><div style="font-weight:600">アカウント切り替え</div><button class="btn bs" onclick="STATE.modal=null;renderContent()"><i class="ti ti-x"></i></button></div>`;
    STATE.accs.forEach(a=>{
      s+=`<div class="ac ${a.id===STATE.uid?'on':''}" onclick="STATE.uid='${a.id}';STATE.modal=null;STATE.page='daily';STATE.entries={};STATE.ratings={};render()">
        <div class="av">${h(a.name[0])}</div>
        <div><div style="font-size:13px;font-weight:600">${h(a.name)}</div><div style="font-size:11px;color:var(--t3)">${h(a.role)} / ${h(a.st)}</div></div>
      </div>`;
    });
    return s+'</div></div>';
  }
  return'';
}

function showModal(m){STATE.modal=m;renderContent();}

function nav(p){
  STATE.page=p;STATE.selRep=null;STATE.selFB=null;
  if(p==='history'){STATE.allReps=[];STATE.hFilter='all';renderContent();loadHistory();}
  else if(p==='feedback'){STATE.fbReps=[];renderContent();loadFeedback();}
  else if(p==='export'){STATE.expReps=[];renderContent();loadExport();}
  else renderContent();
}

function renderContent(){
  let c='';
  if(STATE.page==='daily')c=renderForm('daily');
  else if(STATE.page==='weekly')c=renderForm('weekly');
  else if(STATE.page==='monthly')c=renderForm('monthly');
  else if(STATE.page==='history')c=renderHistory();
  else if(STATE.page==='feedback')c=renderFeedback();
  else if(STATE.page==='export')c=renderExport();
  else if(STATE.page==='settings')c=renderSettings();
  document.getElementById('cnt').innerHTML=c;
  document.getElementById('modal-area').innerHTML=renderModal();
  const s=document.getElementById('sidebar');if(s)s.outerHTML=renderSidebar();
}


function renderLogin(){
  return`<div class="sw"><div class="sb">
    <div style="font-size:18px;font-weight:700;color:var(--brand);margin-bottom:4px">RIGARESSE</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:22px">報告管理システム</div>
    <label>氏名</label>
    <select id="login-uid" style="width:100%;margin-bottom:10px">
      ${STATE.accs.map(a=>'<option value="'+a.id+'">'+h(a.name)+' / '+h(a.st)+'</option>').join('')}
    </select>
    <label>パスワード</label>
    <input type="password" id="login-pw" placeholder="パスワードを入力..." style="margin-bottom:10px" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="login-err" class="hidden ae al" style="margin-bottom:10px"></div>
    <button class="btn bp" style="width:100%" onclick="doLogin()"><i class="ti ti-login"></i>ログイン</button>
  </div></div>`;
}

function doLogin(){
  const uid=document.getElementById('login-uid')?.value;
  const pw=document.getElementById('login-pw')?.value||'';
  const e=document.getElementById('login-err');
  const stored=STATE.pws[uid]||'';
  const user=STATE.accs.find(a=>a.id===uid);
  if(!user){e.textContent='ユーザーが見つかりません';e.classList.remove('hidden');return;}
  if(stored===''||stored===pw){
    STATE.loggedIn={uid,name:user.name};
    STATE.uid=uid;
    sl(LK,{uid,name:user.name});
    render();
  }else{
    e.textContent='パスワードが違います';
    e.classList.remove('hidden');
  }
}

function doLogout(){
  STATE.loggedIn=null;
  sl(LK,null);
  render();
}
function render(){
  const app=document.getElementById('app');
  if(!STATE.token){app.innerHTML=renderSetup();return;}
  if(!STATE.loggedIn){app.innerHTML=renderLogin();return;}
  STATE.uid=STATE.loggedIn.uid;
  app.innerHTML=`<div class="app">
    ${renderSidebar()}
    <div class="main">
      ${renderTopbar()}
      <div class="cnt" id="cnt"></div>
    </div>
  </div><div id="modal-area"></div>`;
  renderContent();
}

render();
</script>
</body>
</html>
