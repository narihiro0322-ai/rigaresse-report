<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リガレッセ 報告管理システム</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',system-ui,sans-serif;background:#f5f5f0;color:#1a1a18;font-size:14px;line-height:1.6}
:root{--brand:#1D9E75;--brand-light:#E1F5EE;--brand-dark:#085041;--bg:#fff;--bg2:#f9f9f7;--bg3:#f5f5f0;--border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.25);--text:#1a1a18;--text2:#555;--text3:#999}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:0.5px solid var(--border)}
.logo{font-size:14px;font-weight:600;color:var(--brand)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px}
.user-info{padding:10px 14px;border-bottom:0.5px solid var(--border);background:var(--bg2);cursor:pointer;transition:background .15s}
.user-info:hover{background:#e8f5f0}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--brand-light);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--brand-dark);margin-right:8px;vertical-align:middle}
.uname{font-size:13px;font-weight:500;vertical-align:middle}
.urole{font-size:10px;color:var(--text3);margin-top:1px;padding-left:38px}
.nav{flex:1;overflow-y:auto;padding:8px 6px}
.nav-sec{font-size:9px;color:var(--text3);font-weight:600;padding:12px 8px 3px;letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--brand-light);color:var(--brand-dark);font-weight:500}
.nav-item i{font-size:16px;width:18px;text-align:center}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg3)}
.topbar{padding:11px 20px;border-bottom:0.5px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:10px}
.topbar-title{font-size:15px;font-weight:500;flex:1}
.sync{font-size:11px;display:flex;align-items:center;gap:5px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.ok{background:#1D9E75}
.dot.syncing{background:#EF9F27;animation:blink 1s infinite}
.dot.err{background:#E24B4A}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.content{flex:1;overflow-y:auto;padding:18px 22px}
.card{background:var(--bg);border-radius:12px;border:0.5px solid var(--border);padding:16px 20px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.card-title i{color:var(--brand);font-size:16px}
.goal-banner{background:var(--brand-light);border-radius:8px;padding:10px 14px;margin-bottom:8px}
.goal-label{font-size:9px;color:#0F6E56;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.goal-text{font-size:12px;color:var(--brand-dark);line-height:1.5}
.form-label{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.form-sub{font-size:10px;color:var(--text3);margin-bottom:6px;line-height:1.4}
.finput,.ftarea,.fselect{width:100%;border:0.5px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;font-family:inherit}
.finput:focus,.ftarea:focus,.fselect:focus{border-color:var(--brand);box-shadow:0 0 0 2px rgba(29,158,117,.1)}
.ftarea{resize:vertical;min-height:72px;line-height:1.6}
.finput{height:34px}
.fselect{height:34px}
.axis-hd{background:var(--bg2);border-radius:7px;padding:7px 12px;margin-bottom:10px;font-size:11px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:6px;border-left:3px solid var(--brand)}
.item-block{border:0.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.item-num{font-size:10px;font-weight:600;color:var(--brand);background:var(--brand-light);padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px}
.item-title{font-size:12px;font-weight:500;margin-bottom:8px}
.stars{display:flex;align-items:center;gap:3px}
.star{font-size:22px;cursor:pointer;color:#D3D1C7;line-height:1;transition:transform .1s}
.star.on{color:#EF9F27}
.star:hover{transform:scale(1.15)}
.star-lbl{font-size:10px;color:var(--text2);margin-left:6px}
.fb-box{background:#EFF6FF;border-radius:8px;padding:10px 12px;margin-top:8px;border-left:3px solid #60A5FA}
.fb-lbl{font-size:9px;font-weight:600;color:#1E40AF;margin-bottom:5px;letter-spacing:.07em;text-transform:uppercase}
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:8px;padding:3px;margin-bottom:14px}
.tab{flex:1;padding:7px 10px;border-radius:6px;border:none;cursor:pointer;font-size:12px;background:transparent;color:var(--text2);transition:all .15s;font-family:inherit}
.tab.on{background:var(--bg);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;color:var(--text);transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-p:hover{background:var(--brand-dark)}
.btn-sm{padding:4px 10px;font-size:11px}
.hitem{border:0.5px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:7px;cursor:pointer;transition:all .15s;background:var(--bg)}
.hitem:hover{border-color:var(--brand);background:var(--brand-light)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.bd{background:#EAF3DE;color:#3B6D11}
.bw{background:#EFF6FF;color:#1E40AF}
.bm{background:#FEF3C7;color:#92400E}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.scard{background:var(--bg2);border-radius:8px;padding:12px;text-align:center}
.snum{font-size:24px;font-weight:600;color:var(--brand)}
.slbl{font-size:10px;color:var(--text2);margin-top:2px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9999}
.modal{background:var(--bg);border-radius:14px;width:90%;max-width:520px;max-height:82vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid var(--border)}
.acc-card{border:0.5px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.acc-card:hover,.acc-card.sel{border-color:var(--brand);background:var(--brand-light)}
.alert{border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;line-height:1.5}
.al-ok{background:#ECFDF5;color:#065F46}
.al-err{background:#FEF2F2;color:#991B1B}
.al-info{background:#EFF6FF;color:#1E40AF}
.divider{height:0.5px;background:var(--border);margin:12px 0}
.empty{text-align:center;padding:36px 16px;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:10px;opacity:.3}
.setup-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg3);padding:20px}
.setup-box{background:var(--bg);border-radius:16px;border:0.5px solid var(--border);padding:32px;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.setup-logo{font-size:20px;font-weight:700;color:var(--brand);margin-bottom:4px}
.setup-sub{font-size:12px;color:var(--text3);margin-bottom:24px}
.setup-step{font-size:11px;font-weight:600;color:var(--brand);margin-bottom:6px;letter-spacing:.05em}
.setup-desc{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const NOTION_DB_ID='d1f1b53669884da3a6246b3f7daf2519';
const NOTION_DB_URL=`https://app.notion.com/p/${NOTION_DB_ID}`;
const TOKEN_KEY='rg_token_v3';
const ACCOUNTS_KEY='rg_accounts_v3';
const GOALS_KEY='rg_goals_v3';

const AXES=[
  {axis:'①複数事業所の経営責任',items:[
    {id:'1-1',no:'①-1',pMain:'①-1_KPI分析',pGoal:'①-1_目標',pSelf:'自己評価_①-1',pFB:'FB_①-1',pFBR:'FB評価_①-1',
     title:'各事業所のKPI比較・分析（稼働率・訪問件数・収支）',
     daily:null,weekly:'先週からの改善状況／次週の目標',monthly:'先月からの改善状況／次月の目標'},
    {id:'1-2',no:'①-2',pMain:'①-2_改善指導',pGoal:'①-2_目標',pSelf:'自己評価_①-2',pFB:'FB_①-2',pFBR:'FB評価_①-2',
     title:'不振事業所への改善指導（具体案の設計から運用）',
     daily:'成績改善のために行ったこと',weekly:'目標達成のための運用評価／次週予定',monthly:'目標達成のための運用評価／次月予定'},
    {id:'1-3',no:'①-3',pMain:'①-3_現場稼働',pGoal:'①-3_目標',pSelf:'自己評価_①-3',pFB:'FB_①-3',pFBR:'FB評価_①-3',
     title:'人員不足時の現場・営業稼働への参画／役職者比率の調整',
     daily:'実行したこと（訪問・営業・その他）',weekly:'実行したこと・成果',monthly:'実行したこと・成果'},
  ]},
  {axis:'②管理者の育成・評価',items:[
    {id:'2-1',no:'②-1',pMain:'②-1_管理者育成',pGoal:'②-1_目標',pSelf:'自己評価_②-1',pFB:'FB_②-1',pFBR:'FB評価_②-1',
     title:'管理者の評価・フィードバック（目標設定と達成度の確認）',
     daily:null,weekly:'達成度の報告／次週の目標',monthly:'達成度の報告／次月の目標'},
  ]},
  {axis:'③ガバナンス・リスク統括',items:[
    {id:'3-1',no:'③-1',pMain:'③-1_事故クレーム',pGoal:null,pSelf:'自己評価_③-1',pFB:'FB_③-1',pFBR:'FB評価_③-1',
     title:'重大事故・クレームのエスカレーション対応',
     daily:'事象と対処',weekly:'経過状況報告',monthly:'問題を残さない'},
    {id:'3-2',no:'③-2',pMain:'③-2_法令リスク',pGoal:null,pSelf:'自己評価_③-2',pFB:'FB_③-2',pFBR:'FB評価_③-2',
     title:'法令リスクの早期察知',
     daily:'事象と対処',weekly:'経過状況報告',monthly:'問題を残さない'},
  ]},
];
const ALL_ITEMS=AXES.flatMap(a=>a.items);

const DEFAULT_ACCOUNTS=[
  {id:'narita',name:'成田 浩明',role:'理事',position:'executive',station:'本部'},
  {id:'seto',name:'瀬戸 担当',role:'管理責任者',position:'manager',station:'豊岡'},
  {id:'lin',name:'林 担当',role:'管理責任者',position:'manager',station:'茨木'},
  {id:'hirose',name:'広瀬 担当',role:'管理責任者',position:'manager',station:'梅ケ谷'},
  {id:'kakimoto',name:'柿本 担当',role:'管理責任者',position:'manager',station:'看多機'},
];

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function today(){return new Date().toISOString().split('T')[0]}
function fmtDate(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${y}年${parseInt(m)}月${parseInt(dd)}日`}
function weekLabel(d){const dt=new Date(d);const dy=dt.getDay();const mon=new Date(dt);mon.setDate(dt.getDate()-(dy===0?6:dy-1));const sun=new Date(mon);sun.setDate(mon.getDate()+6);return`${mon.getMonth()+1}/${mon.getDate()}〜${sun.getMonth()+1}/${sun.getDate()}週`}
function monthLabel(d){const[y,m]=d.split('-');return`${y}年${parseInt(m)}月`}
const TL={daily:'日報',weekly:'週報',monthly:'月報'};
const BC={日報:'bd',週報:'bw',月報:'bm'};

async function notionPost(token,path,body){
  const r=await fetch(`https://api.notion.com/v1${path}`,{
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json','Notion-Version':'2022-06-28'},
    body:JSON.stringify(body)
  });
  return r.json();
}
async function notionPatch(token,path,body){
  const r=await fetch(`https://api.notion.com/v1${path}`,{
    method:'PATCH',
    headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json','Notion-Version':'2022-06-28'},
    body:JSON.stringify(body)
  });
  return r.json();
}
async function notionQuery(token,dbId,filter,sorts,pageSize=50){
  const body={page_size:pageSize};
  if(filter)body.filter=filter;
  if(sorts)body.sorts=sorts;
  const r=await fetch(`https://api.notion.com/v1/databases/${dbId}/query`,{
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json','Notion-Version':'2022-06-28'},
    body:JSON.stringify(body)
  });
  return r.json();
}

function buildProps(record,user){
  const typeLabel=TL[record.type];
  const props={
    '報告タイトル':{title:[{text:{content:`${typeLabel}｜${user.name}｜${record.date}`}}]},
    '種別':{select:{name:typeLabel}},
    '報告者名':{rich_text:[{text:{content:user.name}}]},
    '事業所':{select:{name:user.station}},
    '役職':{select:{name:user.role}},
    '報告日':{date:{start:record.date}},
    '特記事項':{rich_text:[{text:{content:record.entries.free||''}}]},
    'FBステータス':{select:{name:'未対応'}},
  };
  ALL_ITEMS.forEach(it=>{
    const v=record.entries[it.pMain];
    if(v)props[it.pMain]={rich_text:[{text:{content:v}}]};
    if(it.pGoal&&record.entries[it.pGoal])props[it.pGoal]={rich_text:[{text:{content:record.entries[it.pGoal]}}]};
    if(record.ratings&&record.ratings[it.pSelf])props[it.pSelf]={number:record.ratings[it.pSelf]};
  });
  return props;
}

function parsePages(pages){
  return pages.map(p=>{
    const pr=p.properties;
    function rt(k){return pr[k]?.rich_text?.map(r=>r.plain_text).join('')||''}
    function num(k){return pr[k]?.number||0}
    function sel(k){return pr[k]?.select?.name||''}
    function dt(k){return pr[k]?.date?.start||''}
    return{
      id:p.id,
      報告タイトル:pr['報告タイトル']?.title?.map(t=>t.plain_text).join('')||'',
      種別:sel('種別'),報告者名:rt('報告者名'),事業所:sel('事業所'),役職:sel('役職'),
      報告日:dt('報告日'),特記事項:rt('特記事項'),FBステータス:sel('FBステータス'),
      ...Object.fromEntries(ALL_ITEMS.flatMap(it=>[
        [it.pMain,rt(it.pMain)],[it.pSelf,num(it.pSelf)],
        [it.pFB,rt(it.pFB)],[it.pFBR,num(it.pFBR)],
        ...(it.pGoal?[[it.pGoal,rt(it.pGoal)]]:[[]])
      ]))
    };
  });
}

function Stars({value,onChange,disabled}){
  const lbl=['','不十分','やや不十分','概ね達成','ほぼ達成','完全達成'];
  return(
    <div className="stars">
      {[1,2,3,4,5].map(s=>(
        <span key={s} className={`star${value>=s?' on':''}`}
          onClick={()=>!disabled&&onChange&&onChange(s)}
          style={{cursor:disabled?'default':'pointer'}}>★</span>
      ))}
      {value>0&&<span className="star-lbl">{lbl[value]}</span>}
    </div>
  );
}

function SetupScreen({onSave}){
  const [token,setToken]=useState('');
  const [testing,setTesting]=useState(false);
  const [err,setErr]=useState('');

  async function handleConnect(){
    if(!token.trim()){setErr('トークンを入力してください');return;}
    setTesting(true);setErr('');
    try{
      const r=await fetch(`https://api.notion.com/v1/databases/${NOTION_DB_ID}`,{
        headers:{'Authorization':`Bearer ${token.trim()}`,'Notion-Version':'2022-06-28'}
      });
      const d=await r.json();
      if(d.id){onSave(token.trim());}
      else{setErr(`接続失敗: ${d.message||'トークンまたはデータベースのアクセス権を確認してください'}`)}
    }catch(e){setErr(`エラー: ${e.message}`);}
    setTesting(false);
  }

  return(
    <div className="setup-wrap">
      <div className="setup-box">
        <div className="setup-logo">RIGARESSE</div>
        <div className="setup-sub">報告管理システム — 初回設定</div>

        <div className="setup-step">STEP 1　Notionトークンを取得</div>
        <div className="setup-desc">
          <a href="https://app.notion.com/developers/connections" target="_blank" style={{color:'var(--brand)'}}>
            app.notion.com/developers/connections
          </a> を開き、「RIGARESSE報告システム」のトークンをコピーしてください。
        </div>

        <div className="setup-step">STEP 2　トークンを入力</div>
        <label className="form-label">インテグレーショントークン</label>
        <input type="password" className="finput" placeholder="ntn_..." value={token}
          onChange={e=>setToken(e.target.value)} style={{marginBottom:10}}/>

        {err&&<div className="alert al-err" style={{marginBottom:10}}><i className="ti ti-alert-circle"></i>{err}</div>}

        <button className="btn btn-p" style={{width:'100%'}} onClick={handleConnect} disabled={testing}>
          <i className="ti ti-plug"></i>{testing?'接続確認中...':'接続してはじめる'}
        </button>

        <div className="alert al-info" style={{marginTop:14}}>
          <i className="ti ti-info-circle"></i>
          トークンはこのブラウザにのみ保存されます。他の端末では再入力が必要です。
        </div>
      </div>
    </div>
  );
}

function GoalBanners({goals,type,uid}){
  const wk=goals[`${uid}_weekly`];
  const mo=goals[`${uid}_monthly`];
  if(type==='daily') return(
    <div>
      {wk&&<div className="goal-banner" style={{marginBottom:6}}><div className="goal-label">今週の目標</div><div className="goal-text">{wk}</div></div>}
      {mo&&<div className="goal-banner"><div className="goal-label">今月の目標</div><div className="goal-text">{mo}</div></div>}
    </div>
  );
  if(type==='weekly'&&mo) return <div className="goal-banner"><div className="goal-label">今月の目標</div><div className="goal-text">{mo}</div></div>;
  return null;
}

function ReportForm({type,uid,accounts,goals,token,onGoalSave,onSync}){
  const [date,setDate]=useState(today());
  const [entries,setEntries]=useState({});
  const [ratings,setRatings]=useState({});
  const [nextGoal,setNextGoal]=useState('');
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState(null);
  const user=accounts.find(a=>a.id===uid)||accounts[0];
  const filteredAxes=AXES.map(ax=>({...ax,items:ax.items.filter(it=>it[type]!==null)})).filter(ax=>ax.items.length>0);

  async function handleSave(){
    setSaving(true);setMsg(null);onSync('syncing');
    try{
      const props=buildProps({type,date,entries,ratings},user);
      const res=await notionPost(token,'/pages',{parent:{database_id:NOTION_DB_ID},properties:props});
      if(res.id){
        if(type==='weekly'&&nextGoal) onGoalSave(uid,'weekly',nextGoal);
        if(type==='monthly'&&nextGoal) onGoalSave(uid,'monthly',nextGoal);
        setMsg({t:'ok',s:'Notionに保存しました ✓'});
        onSync('ok');
        setEntries({});setRatings({});setNextGoal('');
      }else{
        setMsg({t:'err',s:`保存失敗: ${res.message||JSON.stringify(res)}`});
        onSync('err');
      }
    }catch(e){setMsg({t:'err',s:`エラー: ${e.message}`});onSync('err');}
    setSaving(false);
  }

  return(
    <div>
      <GoalBanners goals={goals} type={type} uid={uid}/>
      <div className="card">
        <div className="card-title"><i className="ti ti-edit"></i>{TL[type]}入力</div>
        <div className="two" style={{marginBottom:14}}>
          <div>
            <label className="form-label">報告日</label>
            <input type="date" className="finput" value={date} onChange={e=>setDate(e.target.value)} style={{width:'100%'}}/>
          </div>
          <div>
            <label className="form-label">報告者</label>
            <div style={{padding:'7px 10px',background:'var(--bg2)',borderRadius:7,fontSize:13,height:34,display:'flex',alignItems:'center'}}>
              {user?.name} / {user?.station}
            </div>
          </div>
        </div>
        {(type==='weekly'||type==='monthly')&&(
          <div style={{background:type==='weekly'?'var(--brand-light)':'#FEF3C7',borderRadius:8,padding:12,marginBottom:14}}>
            <label className="form-label" style={{color:type==='weekly'?'var(--brand-dark)':'#92400E'}}>
              来{type==='weekly'?'週':'月'}の目標
            </label>
            <input type="text" className="finput" placeholder={`来${type==='weekly'?'週':'月'}の目標を入力...`}
              value={nextGoal} onChange={e=>setNextGoal(e.target.value)}/>
          </div>
        )}
        {filteredAxes.map(ax=>(
          <div key={ax.axis}>
            <div className="axis-hd"><i className="ti ti-building" style={{fontSize:13}}></i>{ax.axis}</div>
            {ax.items.map(it=>(
              <div key={it.id} className="item-block">
                <span className="item-num">{it.no}</span>
                <div className="item-title">{it.title}</div>
                <div className="form-sub">{it[type]}</div>
                <textarea className="ftarea" rows={3} placeholder="記入してください..."
                  value={entries[it.pMain]||''} onChange={e=>setEntries(p=>({...p,[it.pMain]:e.target.value}))}/>
                {it.pGoal&&(type==='weekly'||type==='monthly')&&(
                  <div style={{marginTop:8}}>
                    <label className="form-label" style={{color:'var(--brand)'}}>次{type==='weekly'?'週':'月'}の目標</label>
                    <input type="text" className="finput" placeholder="目標を設定..."
                      value={entries[it.pGoal]||''} onChange={e=>setEntries(p=>({...p,[it.pGoal]:e.target.value}))}/>
                  </div>
                )}
              </div>
            ))}
          </div>
        ))}
        <div style={{marginBottom:12}}>
          <label className="form-label">特記事項・自由記述</label>
          <textarea className="ftarea" rows={2} placeholder="その他連絡事項・気づき等..."
            value={entries.free||''} onChange={e=>setEntries(p=>({...p,free:e.target.value}))}/>
        </div>
        {msg&&<div className={`alert ${msg.t==='ok'?'al-ok':'al-err'}`}><i className={`ti ti-${msg.t==='ok'?'check':'alert-circle'}`}></i>{msg.s}</div>}
        <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
          <a href={NOTION_DB_URL} target="_blank" className="btn btn-sm"><i className="ti ti-external-link"></i>Notionで確認</a>
          <button className="btn btn-p" onClick={handleSave} disabled={saving}>
            <i className="ti ti-cloud-upload"></i>{saving?'保存中...':'Notionに保存'}
          </button>
        </div>
      </div>
    </div>
  );
}

function HistoryView({token,accounts,uid,onSync}){
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(false);
  const [filter,setFilter]=useState('all');
  const [sel,setSel]=useState(null);
  const user=accounts.find(a=>a.id===uid);

  async function load(){
    setLoading(true);onSync('syncing');
    try{
      const res=await notionQuery(token,NOTION_DB_ID,
        {property:'報告者名',rich_text:{equals:user?.name||''}},
        [{property:'報告日',direction:'descending'}],50);
      if(res.results) setReports(parsePages(res.results));
      onSync('ok');
    }catch{onSync('err');}
    setLoading(false);
  }
  useEffect(()=>{load();},[uid]);

  const filtered=filter==='all'?reports:reports.filter(r=>r.種別===filter);

  if(sel){
    return(
      <div>
        <button className="btn btn-sm" style={{marginBottom:12}} onClick={()=>setSel(null)}><i className="ti ti-arrow-left"></i>一覧に戻る</button>
        <div className="card">
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
            <span className={`badge ${BC[sel.種別]||''}`}>{sel.種別}</span>
            <span style={{fontWeight:500}}>{fmtDate(sel.報告日)}</span>
          </div>
          {AXES.map(ax=>(
            <div key={ax.axis}>
              <div className="axis-hd">{ax.axis}</div>
              {ax.items.map(it=>{
                const v=sel[it.pMain];const g=it.pGoal?sel[it.pGoal]:null;
                const s=sel[it.pSelf];const fb=sel[it.pFB];const fbr=sel[it.pFBR];
                if(!v&&!g)return null;
                return(
                  <div key={it.id} className="item-block">
                    <span className="item-num">{it.no}</span>
                    <div className="item-title">{it.title}</div>
                    {v&&<div style={{fontSize:12,padding:'8px 10px',background:'var(--bg2)',borderRadius:6,marginBottom:5,lineHeight:1.6}}>{v}</div>}
                    {g&&<div style={{fontSize:12,padding:'6px 10px',background:'var(--brand-light)',borderRadius:6,color:'var(--brand-dark)',marginBottom:5}}>目標：{g}</div>}
                    {s>0&&<div style={{marginTop:4}}><Stars value={s} disabled/></div>}
                    {fb&&<div className="fb-box"><div className="fb-lbl">上位フィードバック</div><div style={{fontSize:12,color:'#1E40AF',lineHeight:1.6}}>{fb}</div>{fbr>0&&<Stars value={fbr} disabled/>}</div>}
                  </div>
                );
              })}

      </div>

  return(
    <div>
      <div className="three" style={{marginBottom:14}}>

          <div key={t} className="scard">
            <div className="snum">{reports.filter(r=>r.種別===t).length}</div>
            <div className="slbl">{t}件数</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
          <div className="tabs" style={{flex:1,marginBottom:0}}>
            {[['all','すべて'],['日報','日報'],['週報','週報'],['月報','月報']].map(([v,l])=>(
              <button key={v} className={`tab${filter===v?' on':''}`} onClick={()=>setFilter(v)}>{l}</button>
            ))}
          </div>
          <button className="btn btn-sm" onClick={load} disabled={loading}><i className="ti ti-refresh"></i></button>
        </div>
        {loading?<div className="empty"><i className="ti ti-loader-2"></i>読み込み中...</div>:
         filtered.length===0?<div className="empty"><i className="ti ti-inbox"></i>記録がありません</div>:
         filtered.map((r,i)=>(
          <div key={i} className="hitem" onClick={()=>setSel(r)}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span className={`badge ${BC[r.種別]||''}`}>{r.種別}</span>
              <span style={{fontSize:12,fontWeight:500,color:'var(--brand)'}}>{fmtDate(r.報告日)}</span>
              {r.種別==='週報'&&<span style={{fontSize:10,color:'var(--text3)'}}>{weekLabel(r.報告日)}</span>}
              {r.種別==='月報'&&<span style={{fontSize:10,color:'var(--text3)'}}>{monthLabel(r.報告日)}</span>}
              {r.FBステータス==='FB済'&&<span style={{fontSize:10,color:'var(--brand)',marginLeft:'auto'}}>FB済✓</span>}
            </div>
          </div>
         ))
        }
      </div>
    </div>
  );
}

function FeedbackView({token,accounts,currentUser,onSync}){
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(false);
  const [sel,setSel]=useState(null);
  const [fb,setFb]=useState({});
  const [fbr,setFbr]=useState({});
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState(null);

  async function load(){
    setLoading(true);onSync('syncing');
    try{
      const res=await notionQuery(token,NOTION_DB_ID,
        {and:[{property:'FBステータス',select:{equals:'未対応'}},
          {or:[{property:'種別',select:{equals:'週報'}},{property:'種別',select:{equals:'月報'}}]}]},
        [{property:'登録日時',direction:'descending'}],50);
      if(res.results){
        const all=parsePages(res.results);
        setReports(all.filter(r=>{
          if(r.報告者名===currentUser.name)return false;
          if(currentUser.position==='executive')return true;
          return r.事業所===currentUser.station;
        }));
      }
      onSync('ok');
    }catch{onSync('err');}
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function saveFB(){
    if(!sel)return;
    setSaving(true);setMsg(null);onSync('syncing');
    const props={'FBステータス':{select:{name:'FB済'}}};
    Object.entries(fb).forEach(([k,v])=>{if(v)props[k]={rich_text:[{text:{content:v}}]}});
    Object.entries(fbr).forEach(([k,v])=>{if(v)props[k]={number:v}});
    try{
      const res=await notionPatch(token,`/pages/${sel.id}`,{properties:props});
      if(res.id){
        setMsg({t:'ok',s:'フィードバックを送信しました ✓'});
        onSync('ok');
        setTimeout(()=>{setSel(null);setFb({});setFbr({});setMsg(null);load();},1500);
      }else{setMsg({t:'err',s:`失敗: ${res.message||''}`});onSync('err');}
    }catch(e){setMsg({t:'err',s:e.message});onSync('err');}
    setSaving(false);
  }

  if(sel){
    return(
      <div>
        <button className="btn btn-sm" style={{marginBottom:12}} onClick={()=>{setSel(null);setFb({});setFbr({});setMsg(null);}}>
          <i className="ti ti-arrow-left"></i>一覧に戻る
        </button>
        <div className="card">
          <div className="card-title"><i className="ti ti-message-circle"></i>
            {sel.報告者名}
            <span className={`badge ${BC[sel.種別]||''}`} style={{marginLeft:4}}>{sel.種別}</span>
            <span style={{fontSize:11,color:'var(--text2)',fontWeight:400}}>{fmtDate(sel.報告日)}</span>
          </div>
          {ALL_ITEMS.map(it=>{
            const v=sel[it.pMain];const g=it.pGoal?sel[it.pGoal]:null;
            if(!v&&!g)return null;
            return(
              <div key={it.id} className="item-block">
                <span className="item-num">{it.no}</span>
                <div className="item-title">{it.title}</div>
                {v&&<div style={{fontSize:12,padding:'8px 10px',background:'var(--bg2)',borderRadius:6,marginBottom:5,lineHeight:1.6}}>{v}</div>}
                {g&&<div style={{fontSize:12,padding:'6px 10px',background:'var(--brand-light)',borderRadius:6,color:'var(--brand-dark)',marginBottom:6}}>目標：{g}</div>}
                {sel[it.pSelf]>0&&<div style={{marginBottom:8}}><span style={{fontSize:10,color:'var(--text2)'}}>自己評価：</span><Stars value={sel[it.pSelf]} disabled/></div>}
                <div style={{background:'#EFF6FF',border:'0.5px solid #BFDBFE',borderRadius:7,padding:10}}>
                  <div style={{fontSize:10,fontWeight:600,color:'#1E40AF',marginBottom:6}}>フィードバック</div>
                  <textarea className="ftarea" rows={2} placeholder="コメント..."
                    value={fb[it.pFB]||''} onChange={e=>setFb(p=>({...p,[it.pFB]:e.target.value}))} style={{marginBottom:6}}/>
                  <Stars value={fbr[it.pFBR]||0} onChange={v=>setFbr(p=>({...p,[it.pFBR]:v}))}/>
                </div>
              </div>
            );
          })}
          {msg&&<div className={`alert ${msg.t==='ok'?'al-ok':'al-err'}`}>{msg.s}</div>}
          <div style={{display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-p" onClick={saveFB} disabled={saving}>
              <i className="ti ti-send"></i>{saving?'送信中...':'フィードバック送信'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span style={{fontSize:12,color:'var(--text2)'}}>未対応 {reports.length}件</span>
        <button className="btn btn-sm" onClick={load} disabled={loading}><i className="ti ti-refresh"></i>更新</button>
      </div>
      {loading?<div className="empty"><i className="ti ti-loader-2"></i>読み込み中...</div>:
       reports.length===0?<div className="empty"><i className="ti ti-checks"></i>未対応はありません</div>:
       reports.map((r,i)=>(
        <div key={i} className="hitem" onClick={()=>{setSel(r);setFb({});setFbr({});}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span className={`badge ${BC[r.種別]||''}`}>{r.種別}</span>
            <span style={{fontSize:13,fontWeight:500}}>{r.報告者名}</span>
            <span style={{fontSize:11,color:'var(--text2)'}}>{r.事業所} / {fmtDate(r.報告日)}</span>
          </div>
        </div>
       ))
      }
    </div>
  );
}

function ExportView({token,accounts,onSync}){
  const [filterUser,setFilterUser]=useState('all');
  const [filterType,setFilterType]=useState('all');
  const [from,setFrom]=useState('');
  const [to,setTo]=useState('');
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(false);

  async function load(){
    setLoading(true);onSync('syncing');
    try{
      const res=await notionQuery(token,NOTION_DB_ID,null,[{property:'報告日',direction:'descending'}],100);
      if(res.results) setReports(parsePages(res.results));
      onSync('ok');
    }catch{onSync('err');}
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  const filtered=reports.filter(r=>{
    const u=accounts.find(a=>a.id===filterUser);
    if(filterUser!=='all'&&r.報告者名!==u?.name)return false;
    if(filterType!=='all'&&r.種別!==filterType)return false;
    if(from&&r.報告日<from)return false;
    if(to&&r.報告日>to)return false;
    return true;
  });

  function exportCSV(){
    const headers=['種別','報告日','報告者名','事業所','役職',
      ...ALL_ITEMS.flatMap(it=>[it.no+'_記入',...(it.pGoal?[it.no+'_目標']:[])]),'特記事項','FBステータス'];
    const rows=filtered.map(r=>[r.種別,r.報告日,r.報告者名,r.事業所,r.役職,
      ...ALL_ITEMS.flatMap(it=>[r[it.pMain]||'',...(it.pGoal?[r[it.pGoal]||'']:[])])
      ,r.特記事項||'',r.FBステータス||'']);
    const csv=[headers,...rows].map(row=>row.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download=`リガレッセ報告_${today()}.csv`;a.click();
  }

  return(
    <div>
      <div className="card">
        <div className="card-title"><i className="ti ti-filter"></i>絞り込み・エクスポート</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <div><label className="form-label">スタッフ</label>
            <select className="fselect" value={filterUser} onChange={e=>setFilterUser(e.target.value)} style={{width:'100%'}}>
              <option value="all">全員</option>
              {accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
          <div><label className="form-label">種別</label>
            <select className="fselect" value={filterType} onChange={e=>setFilterType(e.target.value)} style={{width:'100%'}}>
              <option value="all">すべて</option>
              <option>日報</option><option>週報</option><option>月報</option>
            </select>
          </div>
          <div><label className="form-label">開始日</label>
            <input type="date" className="finput" value={from} onChange={e=>setFrom(e.target.value)} style={{width:'100%'}}/>
          </div>
          <div><label className="form-label">終了日</label>
            <input type="date" className="finput" value={to} onChange={e=>setTo(e.target.value)} style={{width:'100%'}}/>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,alignItems:'center'}}>
          <span style={{fontSize:12,color:'var(--text2)'}}>{filtered.length}件</span>
          <button className="btn btn-sm" onClick={load} disabled={loading}><i className="ti ti-refresh"></i>更新</button>
          <button className="btn btn-p" onClick={exportCSV} disabled={filtered.length===0}>
            <i className="ti ti-file-spreadsheet"></i>CSV出力
          </button>
        </div>
      </div>
      <div className="card">
        {loading?<div className="empty"><i className="ti ti-loader-2"></i>読み込み中...</div>:
         filtered.length===0?<div className="empty"><i className="ti ti-inbox"></i>該当なし</div>:
         filtered.map((r,i)=>(
          <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'8px 0',borderBottom:'0.5px solid var(--border)'}}>
            <span className={`badge ${BC[r.種別]||''}`}>{r.種別}</span>
            <span style={{fontSize:12,fontWeight:500,minWidth:80}}>{fmtDate(r.報告日)}</span>
            <span style={{fontSize:12}}>{r.報告者名}</span>
            <span style={{fontSize:11,color:'var(--text2)'}}>{r.事業所}</span>
            {r.FBステータス==='FB済'&&<span style={{fontSize:10,color:'var(--brand)',marginLeft:'auto'}}>FB済</span>}
          </div>
         ))
        }
      </div>
    </div>
  );
}

            <div className="avatar" style={{width:28,height:28,fontSize:11,flexShrink:0}}>{a.name[0]}</div>

              <div style={{fontSize:13,fontWeight:500}}>{a.name}</div>
              <div style={{fontSize:10,color:'var(--text3)'}}>{a.role} / {a.station}</div>

}

  function saveToken(t){ss(TOKEN_KEY,t);setToken(t);}
  function logout(){ss(TOKEN_KEY,null);setToken(null);}
  function saveGoal(id,type,val){const u={...goals,[`${id}_${type}`]:val};setGoals(u);ss(GOALS_KEY,u);}

  if(!token) return <SetupScreen onSave={saveToken}/>;

  const user=accounts.find(a=>a.id===uid)||accounts[0];
  const isManager=user?.position==='executive'||user?.position==='manager';

  const navItems=[
    {id:'daily',icon:'ti-sun',label:'日報'},
    {id:'weekly',icon:'ti-calendar-week',label:'週報'},
    {id:'monthly',icon:'ti-calendar-month',label:'月報'},
    {id:'history',icon:'ti-history',label:'履歴'},
    ...(isManager?[{id:'feedback',icon:'ti-message-circle',label:'フィードバック'}]:[]),
    {id:'export',icon:'ti-download',label:'エクスポート'},
    {id:'settings',icon:'ti-settings',label:'設定'},
  ];
  const ptitle={daily:'日報',weekly:'週報',monthly:'月報',history:'報告履歴',feedback:'フィードバック',export:'エクスポート',settings:'設定'}[page];
  const slbl={ok:'Notion同期済',syncing:'同期中...',err:'同期エラー'}[sync];

  return(
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="logo">RIGARESSE</div>
          <div className="logo-sub">報告管理システム</div>
        </div>
        <div className="user-info" onClick={()=>setShowSwitch(true)}>
          <span className="avatar">{user?.name?.[0]||'?'}</span>
          <span className="uname">{user?.name}</span>
          <div className="urole">{user?.role} / {user?.station}</div>
        </div>
        <nav className="nav">
          <div className="nav-sec">報告入力</div>
          {navItems.slice(0,3).map(n=>(
            <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
              <i className={`ti ${n.icon}`}></i>{n.label}
            </div>
          ))}
          <div className="nav-sec">管理</div>
          {navItems.slice(3).map(n=>(
            <div key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
              <i className={`ti ${n.icon}`}></i>{n.label}
            </div>
          ))}
        </nav>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{ptitle}</div>
          <div className="sync"><div className={`dot ${sync}`}></div>{slbl}</div>
          <a href={NOTION_DB_URL} target="_blank" className="btn btn-sm"><i className="ti ti-external-link"></i>Notionで開く</a>
        </div>
        <div className="content">
          {(page==='daily'||page==='weekly'||page==='monthly')&&(
            <ReportForm type={page} uid={uid} accounts={accounts} goals={goals}
              token={token} onGoalSave={saveGoal} onSync={setSync}/>
          )}
          {page==='history'&&<HistoryView token={token} accounts={accounts} uid={uid} onSync={setSync}/>}
          {page==='feedback'&&<FeedbackView token={token} accounts={accounts} currentUser={user} onSync={setSync}/>}
          {page==='export'&&<ExportView token={token} accounts={accounts} onSync={setSync}/>}
          {page==='settings'&&<SettingsView accounts={accounts} setAccounts={setAccounts} token={token} setToken={saveToken} onLogout={logout}/>}
        </div>
      </div>
      {showSwitch&&(
        <div className="overlay" onClick={()=>setShowSwitch(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-hd">
              <div style={{fontWeight:500}}>アカウント切り替え</div>
              <button className="btn btn-sm" onClick={()=>setShowSwitch(false)}><i className="ti ti-x"></i></button>
            </div>
            {accounts.map(a=>(
              <div key={a.id} className={`acc-card${a.id===uid?' sel':''}`}
                onClick={()=>{setUid(a.id);setShowSwitch(false);setPage('daily');}}>
                <div className="avatar">{a.name[0]}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:500}}>{a.name}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{a.role} / {a.station}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
